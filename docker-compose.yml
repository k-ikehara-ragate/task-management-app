# フロント・バックエンド・DB を Docker で一括管理。docker compose up で環境が整う。
# リポジトリルートで: docker compose up（または npm run docker:dev）
#
# 【重要】ブラウザで開くURL: http://localhost:3000
# ログに表示される http://0.0.0.0:3000 はブラウザでは開けません。必ず localhost を使用してください。
# DynamoDB: http://localhost:8000
#
# データ永続化: DynamoDB Local は名前付きボリューム dynamodb_data に保存。
# Docker 終了後もデータは残り、再起動時は同じデータが利用可能。Windows/Mac/Linux で同じ構成。

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: task-management-dynamodb-local
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/data"]
    volumes:
      - dynamodb_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8000 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  # DB 初期化（テーブル作成・担当者シード）。完了後に終了する。
  db-init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-management-db-init
    environment:
      DYNAMODB_ENDPOINT: "http://dynamodb-local:8000"
      DYNAMODB_TABLE: "task-management"
    depends_on:
      dynamodb-local:
        condition: service_healthy
    restart: "no"

  # フロント開発用。db-init 完了後に起動。
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: task-management-frontend-dev
    ports:
      - "3000:3000"
    environment:
      NUXT_DYNAMODB_ENDPOINT: "http://dynamodb-local:8000"
      NUXT_HOST: "0.0.0.0"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      db-init:
        condition: service_completed_successfully
    stdin_open: true
    tty: true

volumes:
  frontend_node_modules:
  dynamodb_data:
